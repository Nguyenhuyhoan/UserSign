name: Sign IPA

run-name: Sign IPA - ${{ inputs.request_id }}

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: Request ID
        required: true
        type: string

      ipa_path:
        description: IPA path
        required: true
        type: string

      cert_dir:
        description: Certificate directory
        required: true
        type: string

      profiles_json:
        description: Selected provisioning profiles
        required: true
        type: string

permissions:
  contents: write

jobs:
  sign:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "UserSign Bot"
          git config user.email "actions@github.com"

      - name: Make signing script executable
        run: chmod +x .github/scripts/sign.sh

      - name: Sign IPA
        id: signing
        continue-on-error: true
        env:
          REQUEST_ID: ${{ inputs.request_id }}
          IPA_PATH: ${{ inputs.ipa_path }}
          CERT_DIR: ${{ inputs.cert_dir }}
          PROFILES_JSON: ${{ inputs.profiles_json }}
          PROFILE_INFO_DIR: ${{ runner.temp }}/usersign-${{ inputs.request_id }}/profiles
        run: .github/scripts/sign.sh

      - name: Create plist and status
        id: publish
        env:
          REQUEST_ID: ${{ inputs.request_id }}
          IPA_INPUT: ${{ inputs.ipa_path }}
          REPOSITORY: ${{ github.repository }}
          SIGN_RESULT: ${{ steps.signing.outcome }}
        run: |
          set -e

          mkdir -p status

          IPA_FILE="signed-${REQUEST_ID}.ipa"
          PLIST_FILE="install-${REQUEST_ID}.plist"

          if [[ "${SIGN_RESULT}" != "success" || ! -f "${IPA_FILE}" ]]; then
            python3 - <<'PY'
          import json
          import os

          request_id = os.environ["REQUEST_ID"]

          status = {
              "request_id": request_id,
              "status": "failed",
              "message": "Ký IPA thất bại. Hãy xem log GitHub Actions."
          }

          with open(f"status/{request_id}.json", "w", encoding="utf-8") as file:
              json.dump(status, file, ensure_ascii=False, indent=2)
          PY

            echo "ok=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          FILE_SIZE="$(stat -f%z "${IPA_FILE}")"

          # GitHub không cho commit file lớn hơn 100 MB.
          if [[ "${FILE_SIZE}" -ge 99000000 ]]; then
            rm -f "${IPA_FILE}"

            python3 - <<'PY'
          import json
          import os

          request_id = os.environ["REQUEST_ID"]

          status = {
              "request_id": request_id,
              "status": "failed",
              "message": "IPA sau khi ký quá lớn để đẩy trực tiếp vào GitHub repository."
          }

          with open(f"status/{request_id}.json", "w", encoding="utf-8") as file:
              json.dump(status, file, ensure_ascii=False, indent=2)
          PY

            echo "ok=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          import plistlib
          import urllib.parse

          request_id = os.environ["REQUEST_ID"]
          repository = os.environ["REPOSITORY"]

          ipa_file = f"signed-{request_id}.ipa"
          plist_file = f"install-{request_id}.plist"

          encoded_ipa = urllib.parse.quote(ipa_file)
          encoded_plist = urllib.parse.quote(plist_file)

          ipa_url = (
              f"https://raw.githubusercontent.com/"
              f"{repository}/main/{encoded_ipa}"
          )

          plist_url = (
              f"https://raw.githubusercontent.com/"
              f"{repository}/main/{encoded_plist}"
          )

          manifest = {
              "items": [
                  {
                      "assets": [
                          {
                              "kind": "software-package",
                              "url": ipa_url
                          }
                      ],
                      "metadata": {
                          "bundle-identifier": f"usersign.{request_id}",
                          "bundle-version": "1.0",
                          "kind": "software",
                          "title": "UserSign App"
                      }
                  }
              ]
          }

          with open(plist_file, "wb") as file:
              plistlib.dump(manifest, file, fmt=plistlib.FMT_XML)

          status = {
              "request_id": request_id,
              "status": "success",
              "message": "Ký IPA thành công.",
              "ipa_path": ipa_file,
              "plist_path": plist_file,
              "ipa_url": ipa_url,
              "plist_url": plist_url,
              "size": os.path.getsize(ipa_file)
          }

          os.makedirs("status", exist_ok=True)

          with open(
              f"status/{request_id}.json",
              "w",
              encoding="utf-8"
          ) as file:
              json.dump(status, file, ensure_ascii=False, indent=2)
          PY

          echo "ok=true" >> "${GITHUB_OUTPUT}"

      - name: Push result to repository
        env:
          REQUEST_ID: ${{ inputs.request_id }}
        run: |
          set -e

          git add "status/${REQUEST_ID}.json"

          if [[ -f "signed-${REQUEST_ID}.ipa" ]]; then
            git add "signed-${REQUEST_ID}.ipa"
          fi

          if [[ -f "install-${REQUEST_ID}.plist" ]]; then
            git add "install-${REQUEST_ID}.plist"
          fi

          if git diff --cached --quiet; then
            echo "Không có dữ liệu để commit"
            exit 0
          fi

          git commit -m "Signed IPA ${REQUEST_ID}"

          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main || true

            if git push origin HEAD:main; then
              echo "Push thành công"
              exit 0
            fi

            echo "Push thất bại lần ${attempt}, đang thử lại..."
            sleep $((attempt * 3))
          done

          echo "Không thể push kết quả"
          exit 1

      - name: Mark workflow failed
        if: steps.publish.outputs.ok != 'true'
        run: |
          echo "Quá trình ký IPA thất bại"
          exit 1

