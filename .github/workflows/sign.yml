
name: Sign IPA
on:
  workflow_dispatch:
    inputs:
      ipa_file:
        description: 'Tên file IPA'
        required: true
      cert_folder:
        description: 'Thư mục chứng chỉ'
        required: true
      provision_file:
        description: 'Tên file Provision'
        required: true

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cài đặt phụ thuộc
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip libssl-dev g++ git cmake

      - name: Build zsign
        run: |
          git clone --depth 1 https://github.com/zhlynn/zsign.git
          cd zsign
          mkdir build && cd build
          cmake ..
          make -j$(nproc)
          sudo cp zsign /usr/local/bin/zsign
          zsign -v || true

      - name: Ký IPA
        run: |
          set -e
          IPA_PATH="ipa/${{ github.event.inputs.ipa_file }}"
          CERT_DIR="cert/${{ github.event.inputs.cert_folder }}"
          PROV_PATH="${CERT_DIR}/${{ github.event.inputs.provision_file }}"

          P12_PATH=$(find "$CERT_DIR" -maxdepth 1 -type f \( -iname '*.p12' -o -iname '*.pfx' \) | head -n 1)

          if [ ! -f "$IPA_PATH" ]; then
            echo "Không thấy IPA: $IPA_PATH"
            exit 1
          fi
          if [ -z "$P12_PATH" ] || [ ! -f "$P12_PATH" ]; then
            echo "Không thấy file p12 trong $CERT_DIR"
            exit 1
          fi
          if [ ! -f "$PROV_PATH" ]; then
            echo "Không thấy provision: $PROV_PATH"
            exit 1
          fi

          echo "IPA: $IPA_PATH"
          echo "P12: $P12_PATH"
          echo "PROV: $PROV_PATH"

          # zsign: giữ dung lượng gần bản gốc, pass p12 = 1
          zsign -k "$P12_PATH" -p "1" -m "$PROV_PATH" -o signed_app.ipa "$IPA_PATH"
          ls -lh signed_app.ipa

      - name: Tạo install.plist
        run: |
          python3 << 'PY'
          import os, glob, plistlib, zipfile, shutil

          # Giải nén tạm để đọc Info.plist
          if os.path.isdir("extracted"):
              shutil.rmtree("extracted")
          os.makedirs("extracted", exist_ok=True)
          with zipfile.ZipFile("signed_app.ipa", "r") as z:
              z.extractall("extracted")

          apps = glob.glob("extracted/Payload/*.app")
          if not apps:
              raise SystemExit("Không tìm thấy .app trong IPA")
          info_path = os.path.join(apps[0], "Info.plist")
          with open(info_path, "rb") as f:
              info = plistlib.load(f)

          bundle_id = info.get("CFBundleIdentifier") or "com.signed.app"
          app_name = (
              info.get("CFBundleDisplayName")
              or info.get("CFBundleName")
              or "SignedApp"
          )
          version = str(info.get("CFBundleShortVersionString") or info.get("CFBundleVersion") or "1.0")

          repo = os.environ.get("GITHUB_REPOSITORY", "Nguyenhuyhoan/UserSign")
          ipa_url = f"https://github.com/{repo}/raw/main/signed_app.ipa"

          plist = f"""<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>items</key>
            <array>
              <dict>
                <key>assets</key>
                <array>
                  <dict>
                    <key>kind</key>
                    <string>software-package</string>
                    <key>url</key>
                    <string>{ipa_url}</string>
                  </dict>
                </array>
                <key>metadata</key>
                <dict>
                  <key>bundle-identifier</key>
                  <string>{bundle_id}</string>
                  <key>bundle-version</key>
                  <string>{version}</string>
                  <key>kind</key>
                  <string>software</string>
                  <key>title</key>
                  <string>{app_name}</string>
                </dict>
              </dict>
            </array>
          </dict>
          </plist>
          """
          # bỏ indent thừa đầu dòng cho sạch
          lines = [ln.lstrip() if ln.strip() else "" for ln in plist.strip().splitlines()]
          # giữ format xml đơn giản
          content = f"""<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>items</key>
              <array>
                  <dict>
                      <key>assets</key>
                      <array>
                          <dict>
                              <key>kind</key>
                              <string>software-package</string>
                              <key>url</key>
                              <string>{ipa_url}</string>
                          </dict>
                      </array>
                      <key>metadata</key>
                      <dict>
                          <key>bundle-identifier</key>
                          <string>{bundle_id}</string>
                          <key>bundle-version</key>
                          <string>{version}</string>
                          <key>kind</key>
                          <string>software</string>
                          <key>title</key>
                          <string>{app_name}</string>
                      </dict>
                  </dict>
              </array>
          </dict>
          </plist>
          """
          with open("install.plist", "w", encoding="utf-8") as f:
              f.write(content)
          print("App:", app_name)
          print("Bundle:", bundle_id)
          print("Version:", version)
          print("IPA URL:", ipa_url)
          PY

      - name: Dọn file tạm
        run: rm -rf extracted zsign

      - name: Push file đã ký lên Repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signed_app.ipa install.plist
          git diff --staged --quiet && echo "Không có thay đổi" && exit 0
          git commit -m "Auto sign: ${{ github.event.inputs.ipa_file }} / ${{ github.event.inputs.cert_folder }}"
          git push origin HEAD:main
